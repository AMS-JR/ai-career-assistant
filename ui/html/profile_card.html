<div class="ca-pcard">
  <div class="ca-pcard-head">
    <div class="ca-av" aria-hidden="true">$av</div>
    <div class="ca-pcard-intro">
      <div class="ca-pname">$name</div>
      <div class="ca-pcard-meta">
        <span class="ca-pmeta">$role</span>
        <span class="ca-pmeta-div" aria-hidden="true"></span>
        <span class="ca-pmeta ca-pmeta--soft">$years experience</span>
      </div>
    </div>
  </div>
  <div class="ca-pcard-body">
    <section class="ca-psection" aria-labelledby="ca-summary-h">
      <h3 class="ca-plabel" id="ca-summary-h">Summary</h3>
      <div class="ca-psummary">$summary_html</div>
    </section>
    <section class="ca-psection" aria-labelledby="ca-skills-h">
      <h3 class="ca-plabel" id="ca-skills-h">Skills</h3>
      <div class="ca-skills">$skills</div>
    </section>
    <p class="ca-pfooter">You can run another job search without uploading again.</p>
  </div>
</div>
