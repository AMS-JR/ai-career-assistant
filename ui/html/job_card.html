<article class="jc">
  <div class="jc-av" aria-hidden="true">$co_ch</div>
  <div class="jc-body">
    <p class="jc-title"><a href="$href" target="_blank" rel="noopener noreferrer">$title</a></p>
    <div class="jc-chips">
      <span class="jc-chip jc-chip-co">$company</span>
      <span class="jc-chip">#$rank</span>
      $src_chip$loc_chip
    </div>
    <p class="jc-desc">$desc</p>
    $why_block
    <a class="jc-link" href="$href" target="_blank" rel="noopener noreferrer">View posting &#8594;</a>
  </div>
  <div class="jc-scores">
    <div class="jc-score jc-score--hi">
      <span class="jc-score-k">Fit</span>
      <span class="jc-score-v">$fit_pct</span>
    </div>
    <div class="jc-score">
      <span class="jc-score-k">Skills</span>
      <span class="jc-score-v">$skl_pct</span>
    </div>
  </div>
</article>
